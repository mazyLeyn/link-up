<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Link-Up | Serverless Chat</title>
    <style>
        body { font-family: sans-serif; background: #0b141a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: #202c33; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 80px; background: #111b21; color: #00a884; border: 1px solid #313d45; border-radius: 8px; padding: 10px; font-size: 10px; margin: 10px 0; resize: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn-offer { background: #0284c7; color: white; }
        .btn-answer { background: #00a884; color: white; }
        #chat { height: 250px; overflow-y: auto; background: #111b21; border: 1px solid #313d45; padding: 10px; margin: 15px 0; border-radius: 8px; }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #2a3942; color: white; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#00a884; text-align:center;">Link-Up</h2>
    
    <div id="setup">
        <label>1. Kendi Kodun (Kopyala Arkadaşına At):</label>
        <textarea id="localCode" readonly placeholder="Kod burada oluşacak..."></textarea>
        <button class="btn btn-offer" onclick="setupOffer()">KOD ÜRET (BAŞLAT)</button>

        <label style="display:block; margin-top:15px;">2. Arkadaştan Gelen Kod:</label>
        <textarea id="remoteCode" placeholder="Arkadaşının kodunu buraya yapıştır..."></textarea>
        <button class="btn btn-answer" onclick="handleRemoteCode()">KODU İŞLE / BAĞLAN</button>
    </div>

    <div id="chat-area" style="display:none;">
        <div id="chat"></div>
        <div class="input-group">
            <input type="text" id="msgInp" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn btn-answer" style="width:auto;" onclick="send()">Gönder</button>
        </div>
    </div>
</div>

<script>
    let pc;
    let dc;

    function createPeer() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        
        pc.onicecandidate = e => {
            if (!e.candidate) {
                document.getElementById('localCode').value = JSON.stringify(pc.localDescription);
                document.getElementById('localCode').select();
            }
        };

        pc.oniceconnectionstatechange = () => {
            if(pc.iceConnectionState === 'connected') {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('chat-area').style.display = 'block';
            }
        };
    }

    // TEKLİF VEREN (A KİŞİSİ)
    async function setupOffer() {
        createPeer();
        dc = pc.createDataChannel("chat");
        setupChat(dc);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
    }

    // KODU İŞLEYEN (B KİŞİSİ VEYA A'NIN CEVABI)
    async function handleRemoteCode() {
        const remoteValue = document.getElementById('remoteCode').value.trim();
        if(!remoteValue) return alert("Kod kutusu boş!");

        const desc = new RTCSessionDescription(JSON.parse(remoteValue));

        if (!pc) { // Eğer henüz başlatılmamışsa (B KİŞİSİ)
            createPeer();
            pc.ondatachannel = e => {
                dc = e.channel;
                setupChat(dc);
            };
            await pc.setRemoteDescription(desc);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
        } else { // A KİŞİSİ (CEVABI İŞLER)
            await pc.setRemoteDescription(desc);
        }
    }

    function setupChat(channel) {
        channel.onmessage = e => addMsg("Arkadaşın", e.data);
        channel.onopen = () => console.log("Bağlantı Açıldı!");
    }

    function send() {
        const inp = document.getElementById('msgInp');
        if (inp.value && dc && dc.readyState === "open") {
            dc.send(inp.value);
            addMsg("Sen", inp.value);
            inp.value = "";
        }
    }

    function addMsg(user, text) {
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div><b>${user}:</b> ${text}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link-Up | Serverless Chat</title>
    <style>
        :root {
            --bg: #0b141a;
            --panel: #202c33;
            --accent: #00a884;
            --text: #e9edef;
            --my-msg: #005c4b;
            --fr-msg: #202c33;
            --border: #313d45;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; padding: 20px; }
        
        .container { width: 100%; max-width: 450px; background: var(--panel); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Kurulum Paneli */
        #setup-area { padding: 20px; border-bottom: 1px solid var(--border); }
        h2 { color: var(--accent); margin-bottom: 10px; text-align: center; }
        textarea { width: 100%; height: 80px; background: #111b21; color: var(--accent); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 11px; margin: 10px 0; resize: none; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-offer { background: #0284c7; margin-bottom: 5px; }
        .btn-process { background: var(--accent); }
        .btn:hover { opacity: 0.8; }
        #log { font-size: 11px; color: #8696a0; margin-top: 10px; height: 40px; overflow-y: auto; text-align: center; }

        /* Sohbet Alanı */
        #chat-area { flex: 1; display: none; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/1500684/157742111-a83d1c1d-1510-47b1-94f8-1d227a9c3397.png'); background-opacity: 0.05; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; position: relative; }
        .me { align-self: flex-end; background: var(--my-msg); border-top-right-radius: 0; }
        .friend { align-self: flex-start; background: var(--fr-msg); border-top-left-radius: 0; }
        .time { font-size: 10px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }

        /* Mesaj Girişi */
        .input-box { padding: 10px; background: #111b21; display: flex; gap: 10px; }
        #msgInput { flex: 1; background: #2a3942; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        #sendBtn { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-area">
        <h2>Link-Up</h2>
        <p style="text-align:center; font-size:12px; color:#8696a0;">Durum: <span id="stat">Bekliyor...</span></p>
        <button class="btn btn-offer" onclick="startOffer()">1. KOD ÜRET (TEKLİF)</button>
        <textarea id="box" placeholder="Kodu buraya yapıştırın veya buradan kopyalayın..."></textarea>
        <button class="btn btn-process" onclick="handleInput()">2. KODU İŞLE</button>
        <div id="log">Sistem hazır.</div>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="sendBtn" onclick="sendMsg()">></button>
        </div>
    </div>
</div>

<script>
    let pc, dc, messageCount = 0;

    function log(msg) {
        document.getElementById('log').innerHTML = msg;
    }

    function createPC() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        
        pc.onicecandidate = e => {
            if (!e.candidate) {
                log("Kod hazır! Kopyalayıp arkadaşına gönder.");
                document.getElementById('box').value = JSON.stringify(pc.localDescription);
                document.getElementById('box').select();
            }
        };

        pc.oniceconnectionstatechange = () => {
            let state = pc.iceConnectionState;
            document.getElementById('stat').innerText = state;
            if (state === "connected") {
                document.getElementById('setup-area').style.display = "none";
                document.getElementById('chat-area').style.display = "flex";
            }
        };
    }

    async function startOffer() {
        createPC();
        dc = pc.createDataChannel("chat");
        setupDC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
    }

    async function handleInput() {
        const val = document.getElementById('box').value.trim();
        if (!val) return log("Kutu boş!");
        try {
            const data = JSON.parse(val);
            if (!pc) {
                createPC();
                pc.ondatachannel = e => { dc = e.channel; setupDC(); };
                await pc.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
            } else {
                await pc.setRemoteDescription(new RTCSessionDescription(data));
            }
        } catch (e) { log("GEÇERSİZ KOD!"); }
    }

    function setupDC() {
        dc.onmessage = e => addMsg('friend', e.data);
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput');
        if (inp.value && dc && dc.readyState === "open") {
            dc.send(inp.value);
            addMsg('me', inp.value);
            inp.value = "";
        }
    }

    function addMsg(who, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${who}`;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        msgDiv.innerHTML = `${text} <span class="time">${time}</span>`;
        
        const area = document.getElementById('messages');
        area.appendChild(msgDiv);
        area.scrollTop = area.scrollHeight;

        // 1000 Mesaj Sınırı
        messageCount++;
        if (messageCount > 1000) {
            area.removeChild(area.firstChild);
        }
    }
</script>

</body>
</html>

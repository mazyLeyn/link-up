<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Link-Up | Hata Ayıklama Modu</title>
    <style>
        body { font-family: sans-serif; background: #0b141a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #202c33; padding: 20px; border-radius: 12px; }
        textarea { width: 100%; height: 100px; background: #111b21; color: #00a884; border: 1px solid #313d45; padding: 10px; font-size: 11px; margin: 10px 0; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-offer { background: #0284c7; color: white; }
        .btn-process { background: #00a884; color: white; }
        #log { font-size: 12px; color: #8696a0; height: 100px; overflow-y: auto; border-top: 1px solid #313d45; pt: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#00a884">Link-Up</h2>
    <p style="font-size:12px">Durum: <span id="stat">Bekliyor...</span></p>
    
    <button class="btn btn-offer" onclick="startOffer()">1. KOD ÜRET (TEKLİF)</button>
    <textarea id="box" placeholder="Kod buraya gelecek veya yapıştırılacak..."></textarea>
    <button class="btn btn-process" onclick="handleInput()">2. KODU İŞLE</button>

    <div id="log"><b>Sistem Günlüğü:</b><br></div>
</div>

<script>
    let pc;
    let dc;

    // Log yazdırma fonksiyonu
    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += "> " + msg + "<br>";
        l.scrollTop = l.scrollHeight;
    }

    function createPC() {
        log("PeerConnection başlatılıyor...");
        pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        
        pc.onicecandidate = e => {
            if (!e.candidate) {
                log("TÜM ADRESLER TOPLANDI. Kodu kopyalayabilirsiniz.");
                document.getElementById('box').value = JSON.stringify(pc.localDescription);
            } else {
                log("Adres bulundu: " + e.candidate.protocol);
            }
        };

        pc.oniceconnectionstatechange = () => {
            document.getElementById('stat').innerText = pc.iceConnectionState;
            log("Bağlantı Durumu: " + pc.iceConnectionState);
        };
    }

    // A KİŞİSİ BAŞLATIR
    async function startOffer() {
        try {
            createPC();
            dc = pc.createDataChannel("chat");
            dc.onopen = () => alert("BAĞLANDI! Mesaj yazabilirsiniz.");
            dc.onmessage = e => log("ARKADAŞIN: " + e.data);

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            log("Teklif oluşturuldu, adresler bekleniyor...");
        } catch (err) {
            log("HATA: " + err.message);
        }
    }

    // KODU İŞLEME (B veya A KİŞİSİ)
    async function handleInput() {
        const val = document.getElementById('box').value.trim();
        if (!val) return log("Hata: Kutu boş!");

        try {
            const data = JSON.parse(val);
            if (!pc) { // B KİŞİSİ
                createPC();
                pc.ondatachannel = e => {
                    dc = e.channel;
                    dc.onopen = () => alert("BAĞLANDI!");
                    dc.onmessage = e => log("ARKADAŞIN: " + e.data);
                };
                await pc.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                log("Cevap oluşturuldu, adresler bekleniyor...");
            } else { // A KİŞİSİ CEVABI İŞLER
                await pc.setRemoteDescription(new RTCSessionDescription(data));
                log("Cevap kabul edildi.");
            }
        } catch (err) {
            log("GEÇERSİZ KOD: " + err.message);
        }
    }
</script>

</body>
</html>
